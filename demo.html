<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demo Home Page</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #f4f6f8;
    color: #333;
}

/* Navbar */
.navbar {
    background: #1e90ff;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
}

.navbar a:hover {
    text-decoration: underline;
}

/* Hero Section */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: white;
}

.hero h2 {
    font-size: 36px;
    margin-bottom: 15px;
}

.hero p {
    font-size: 18px;
    margin-bottom: 25px;
}

.hero button {
    padding: 12px 25px;
    font-size: 16px;
    background: #1e90ff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.hero button:hover {
    background: #0f78d1;
}

/* Features */
.features {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px 20px;
}

.card {
    background: white;
    padding: 25px;
    width: 250px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card h3 {
    margin-bottom: 10px;
    color: #1e90ff;
}

/* Footer */
footer {
    text-align: center;
    padding: 15px;
    background: #1e90ff;
    color: white;
}

    </style>
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <h1 class="logo">MyDemoSite</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to My Demo Website</h2>
        <p>This is a simple home page created using HTML and CSS.</p>
        <button>Get Started</button>
    </section>

    <!-- Features -->
    <section class="features">
        <div class="card">
            <h3>Fast</h3>
            <p>Lightweight and quick to load.</p>
        </div>
        <div class="card">
            <h3>Responsive</h3>
            <p>Looks good on all devices.</p>
        </div>
        <div class="card">
            <h3>Simple</h3>
            <p>Easy to understand and customize.</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyDemoSite. All rights reserved.</p>
    </footer>

</body>
</html>
